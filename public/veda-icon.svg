<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="50%" stop-color="#312e81" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdf08a" />
      <stop offset="50%" stop-color="#facc15" />
      <stop offset="100%" stop-color="#a16207" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="112" fill="url(#bg)" />

  <!-- North Indian Chart Geometry -->
  <g stroke="url(#gold)" stroke-width="24" stroke-linejoin="round" stroke-linecap="round" filter="url(#glow)">
    <!-- Outer Square -->
    <rect x="112" y="112" width="288" height="288" rx="8" />
    
    <!-- Diagonals -->
    <line x1="112" y1="112" x2="400" y2="400" />
    <line x1="400" y1="112" x2="112" y2="400" />
    
    <!-- Inner Diamond -->
    <polygon points="256,112 400,256 256,400 112,256" stroke-linejoin="miter" />
  </g>

  <!-- Center Sun (Soul/Surya) -->
  <circle cx="256" cy="256" r="32" fill="url(#gold)" filter="url(#glow)" />
</svg>
